[phases.setup]
nixPkgs = ["nodejs_22", "pnpm"]

[phases.install]
cmds = [
  "pnpm install --no-frozen-lockfile",
  "pnpm rebuild esbuild lightningcss @tailwindcss/oxide sharp bufferutil utf-8-validate || true"
]

[phases.build]
cmds = ["pnpm run build:prod", "chmod +x start.sh"]

[start]
cmd = "node --enable-source-maps artifacts/api-server/dist/index.mjs"

[variables]
BASE_PATH = "/"
NODE_ENV = "production"
PORT = "8080"
NIXPACKS_NODE_VERSION = "22"

[phases.setup]
nixPkgs = ["nodejs_22", "pnpm"]

[phases.install]
cmds = [
  "pnpm install --no-frozen-lockfile",
  "pnpm rebuild esbuild lightningcss @tailwindcss/oxide sharp bufferutil utf-8-validate || true"
]

[phases.build]
cmds = ["pnpm run build:prod", "chmod +x start.sh"]

[start]
cmd = "node scripts/start.mjs"

[variables]
BASE_PATH = "/"
NODE_ENV = "production"
NIXPACKS_NODE_VERSION = "22"

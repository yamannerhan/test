    <div id="root"><div style="min-height:100dvh;display:flex;align-items:center;justify-content:center;background:#0F172A;flex-direction:column;gap:16px;padding:20px;text-align:center;color:#F1F5F9;font-family:Inter,system-ui,sans-serif"><div id="_loader" style="width:40px;height:40px;border:3px solid rgba(79,70,229,0.25);border-top-color:#4F46E5;border-radius:50%;animation:_sp 0.8s linear infinite"></div><div id="_recovery" style="display:none;max-width:340px"><h2 style="font-size:18px;font-weight:700;margin:0 0 8px">Sayfa yüklenemedi</h2><p style="font-size:13px;color:#94A3B8;margin:0 0 16px;line-height:1.5">Cihazınızdaki eski sürüm engelliyor olabilir. Aşağıdaki butona basarak temiz bir başlangıç yapın.</p><button onclick="window._forceRecover()" style="background:linear-gradient(135deg,#4F46E5,#7C3AED);color:#fff;border:0;padding:12px 24px;border-radius:10px;font-weight:700;font-size:14px;cursor:pointer;box-shadow:0 4px 14px rgba(79,70,229,0.4)">Sayfayı Yenile ve Temizle</button></div><style>@keyframes _sp{to{transform:rotate(360deg)}}</style></div></div>
    <script>
      // Recovery: 10 saniye içinde React mount olmazsa kurtarma butonunu göster
      window._forceRecover = function() {
        try {
          if ("serviceWorker" in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              return Promise.all(regs.map(function(r) { return r.unregister(); }));
            }).catch(function() {}).finally(function() {
              if ("caches" in window) {
                caches.keys().then(function(k) {
                  return Promise.all(k.map(function(c) { return caches.delete(c); }));
                }).catch(function() {}).finally(function() {
                  try { localStorage.clear(); } catch(e) {}
                  try { sessionStorage.clear(); } catch(e) {}
                  window.location.replace(window.location.pathname + "?_r=" + Date.now());
                });
              } else {
                window.location.replace(window.location.pathname + "?_r=" + Date.now());
              }
            });
          } else {
            window.location.replace(window.location.pathname + "?_r=" + Date.now());
          }
        } catch (e) {
          window.location.reload(true);
        }
      };
      setTimeout(function() {
        var root = document.getElementById("root");
        // Eğer hala loader varsa (React mount olmadı) recovery göster
        if (root && root.querySelector("#_loader")) {
          var loader = document.getElementById("_loader");
          var rec = document.getElementById("_recovery");
          if (loader) loader.style.display = "none";
          if (rec) rec.style.display = "block";
        }
      }, 10000);
    </script>
    <script type="module" src="/src/main.tsx"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"></noscript>
  </head>
  <body>
    <div id="root"><div style="min-height:100dvh;display:flex;align-items:center;justify-content:center;background:#0F172A"><div style="width:40px;height:40px;border:3px solid rgba(79,70,229,0.25);border-top-color:#4F46E5;border-radius:50%;animation:_sp 0.8s linear infinite"></div><style>@keyframes _sp{to{transform:rotate(360deg)}}</style></div></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        var _reloading = false;
        function doReload() {
          if (_reloading) return;
          _reloading = true;
          try {
            if ("caches" in window) {
              caches.keys().then(function(k) {
                return Promise.all(k.map(function(c) { return caches.delete(c); }));
              }).then(function() { window.location.reload(true); });
            } else { window.location.reload(true); }
          } catch(e) { window.location.reload(true); }
        }

        // Katman 1: BUILD_TS (transformIndexHtml her restarttan sonra yeni değer yazar)
        var BUILD_TS = "__BUILD_TS__";
        var btsStored = localStorage.getItem("_bts");
        if (btsStored && btsStored !== BUILD_TS && BUILD_TS.indexOf("BUILD_TS") === -1) {
          localStorage.setItem("_bts", BUILD_TS);
          doReload(); return;
        }
        localStorage.setItem("_bts", BUILD_TS);

        // Katman 2: /version.json polling — SW'den tamamen bağımsız
        // Eski SW bu dosyayı önbelleğe almadı, network-first ile taze okur
        function checkVersion() {
          fetch("/version.json?_=" + Date.now(), { cache: "no-store" })
            .then(function(r) { return r.json(); })
            .then(function(d) {
              var vs = localStorage.getItem("_ver");
              if (vs && vs !== d.v) { localStorage.setItem("_ver", d.v); doReload(); }
              else { localStorage.setItem("_ver", d.v); }
            }).catch(function() {});
        }
        checkVersion();
        setInterval(checkVersion, 15000);

        // Katman 3: Service Worker olayları (geri uyumluluk + yeni SW)
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.addEventListener("controllerchange", doReload);
          navigator.serviceWorker.addEventListener("message", function(e) {
            if (e.data && e.data.type === "SW_UPDATED") doReload();
          });
          window.addEventListener("load", function() {
            navigator.serviceWorker.register("/sw.js", { updateViaCache: "none" })
              .then(function(reg) {
                reg.update();
                setInterval(function() { reg.update(); }, 20000);
              }).catch(function() {});
          });
        }
      })();
    </script>
  </body>
</html>

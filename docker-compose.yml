services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: ozelguvenlik
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://app:app@postgres:5432/ozelguvenlik
      NODE_ENV: production
      BASE_PATH: /
      PORT: "8080"
    depends_on:
      - postgres

volumes:
  pgdata:
